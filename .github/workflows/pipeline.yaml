name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Test action
        uses: ./
        with:
          BACKEND_ACCESS_KEY_ID: 'backend_access_key_id'
          BACKEND_SECRET_ACCESS_KEY: 'backend_secret_access_key'
          STACKIT_SERVICE_ACCOUNT_KEY: 'stackit_service_account_key'
          terraform_module: 'test'

  test-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Test action validation
        id: validation
        uses: ./
        with:
          BACKEND_ACCESS_KEY_ID: 'backend_access_key_id'
          BACKEND_SECRET_ACCESS_KEY: 'backend_secret_access_key'
          terraform_module: 'test'
        continue-on-error: true
      - name: Verify validation failed
        run: |
          if [ ${{ steps.validation.outcome }} == 'failure' ]; then
            echo "✓ Validation correctly failed as expected"
            exit 0
          else
            echo "✗ Validation should have failed but succeeded"
            exit 1
          fi
